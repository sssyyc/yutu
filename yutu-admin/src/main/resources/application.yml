server:
  port: 8080

spring:
  application:
    name: yutu-admin
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3307/yutu_travel?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    timeout: 3000ms
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.yutu.modules.model.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: yutu-platform-secret-key
  expire-seconds: 86400

app:
  token:
    redis-prefix: "YUTU:TOKEN:"
  file:
    upload-dir: uploads
  alipay:
    enabled: ${ALIPAY_ENABLED:false}
    protocol: ${ALIPAY_PROTOCOL:https}
    gateway-host: ${ALIPAY_GATEWAY_HOST:openapi-sandbox.dl.alipaydev.com}
    app-id: ${ALIPAY_APP_ID:}
    merchant-private-key: ${ALIPAY_MERCHANT_PRIVATE_KEY:}
    alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
